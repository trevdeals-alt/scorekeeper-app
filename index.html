<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scorekeeper</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4CAF50">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
  }

  .half {
    height: 50vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  .top {
    background: #4CAF50;
    color: white;
  }

  .bottom {
    background: #2196F3;
    color: white;
  }

  .score {
    font-size: 80px;
    margin-bottom: 20px;
  }

  button {
    font-size: 20px;
    margin: 5px;
    padding: 10px 20px;
  }
</style>
</head>

<body>

<div class="half top">
  <div id="score1" class="score">0</div>
  <div>
    <button onclick="changeScore(1, 1)">+1</button>
    <button onclick="changeScore(1, -1)">−1</button>
    <button onclick="resetScore(1)">Reset</button>
  </div>
</div>

<div class="half bottom">
  <div id="score2" class="score">0</div>
  <div>
    <button onclick="changeScore(2, 1)">+1</button>
    <button onclick="changeScore(2, -1)">−1</button>
    <button onclick="resetScore(2)">Reset</button>
  </div>
</div>

<script>
let scores = [0, 0];

function changeScore(player, amount) {
  scores[player - 1] += amount;
  if (scores[player - 1] < 0) scores[player - 1] = 0;
  document.getElementById("score" + player).textContent = scores[player - 1];
}

function resetScore(player) {
  scores[player - 1] = 0;
  document.getElementById("score" + player).textContent = 0;
}
</script>

</body>
</html>
